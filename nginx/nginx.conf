events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 동영상 업로드 허용 사이즈 (talent_media MAX_MOVIE_BYTES = 500MB 와 일치)
    client_max_body_size 600M;

    # gzip 압축 (정적 자산)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml;

    upstream backend  { server backend:8000;  }
    upstream frontend { server frontend:3000; }

    server {
        listen 80 default_server;
        server_name _;

        # ─────────────────────────────────────────────────────────
        # 내부 전용 location — backend 가 X-Accel-Redirect 헤더로 호출
        #   alias 의 끝 / 는 location 의 prefix 를 file path 에 매칭
        # ─────────────────────────────────────────────────────────
        location /internal-uploads/ {
            internal;
            alias /var/uploads/;
        }

        # ─────────────────────────────────────────────────────────
        # /api/* → backend  (prefix 제거)
        # ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # X-Accel-Redirect 가 응답에 포함되면 nginx 가 가로채서 처리
            proxy_intercept_errors off;
            proxy_buffering        off;
        }

        # ─────────────────────────────────────────────────────────
        # 그 외 → frontend (Next.js)
        # ─────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
